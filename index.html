<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SiteProNY developed by Irgang Group</title>
  
  <script>
    window.addEventListener('error', function(e) {
      const errorDiv = document.createElement('div');
      errorDiv.style.position = 'fixed';
      errorDiv.style.bottom = '20px';
      errorDiv.style.left = '20px';
      errorDiv.style.right = '20px';
      errorDiv.style.background = '#ff0055';
      errorDiv.style.color = '#fff';
      errorDiv.style.padding = '20px';
      errorDiv.style.borderRadius = '10px';
      errorDiv.style.zIndex = '99999';
      errorDiv.style.fontFamily = 'monospace';
      errorDiv.style.fontSize = '12px';
      errorDiv.style.whiteSpace = 'pre-wrap';
      errorDiv.style.boxShadow = '0 10px 30px rgba(0,0,0,0.5)';
      errorDiv.innerHTML = '<strong>Unhandled Runtime Error:</strong><br>' + e.message + '<br>at ' + e.filename + ':' + e.lineno;
      document.body.appendChild(errorDiv);
    });
    window.addEventListener('unhandledrejection', function(e) {
      const errorDiv = document.createElement('div');
      errorDiv.style.position = 'fixed';
      errorDiv.style.bottom = '20px';
      errorDiv.style.left = '20px';
      errorDiv.style.right = '20px';
      errorDiv.style.background = '#ff0055';
      errorDiv.style.color = '#fff';
      errorDiv.style.padding = '20px';
      errorDiv.style.borderRadius = '10px';
      errorDiv.style.zIndex = '99999';
      errorDiv.style.fontFamily = 'monospace';
      errorDiv.style.fontSize = '12px';
      errorDiv.style.whiteSpace = 'pre-wrap';
      errorDiv.style.boxShadow = '0 10px 30px rgba(0,0,0,0.5)';
      errorDiv.innerHTML = '<strong>Unhandled Promise Rejection:</strong><br>' + (e.reason ? e.reason.stack || e.reason.message || e.reason : e);
      document.body.appendChild(errorDiv);
    });
  </script>
  
  <!-- Leaflet GIS Map Library CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" 
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <div class="app-container">
    <!-- Sidebar Dashboard -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo-container">
          <div class="logo-icon">SP</div>
          <div class="logo-text-wrapper">
            <h1 class="logo-text">SiteProNY</h1>
            <span class="logo-subtext">developed by Irgang Group</span>
          </div>
        </div>
      </div>
      
      <!-- Search Input Section -->
      <section class="search-section">
        <div class="search-input-wrapper">
          <span class="search-icon">🔍</span>
          <input type="text" id="site-search-input" class="search-input" 
                 placeholder="Search address or BBL (e.g. 350 Fifth Ave)..." autocomplete="off">
        </div>
        <!-- Autocomplete Suggestions Dropdown -->
        <div id="autocomplete-dropdown" class="autocomplete-dropdown"></div>
      </section>
      
      <!-- Tab Navigation Section -->
      <nav class="sidebar-tabs" id="sidebar-tabs" style="display: none;">
        <button class="tab-btn active" data-tab="zoning">Zoning & Massing</button>
        <button class="tab-btn" data-tab="financials">Financial Underwriting</button>
      </nav>
      
      <!-- Main Report Panel Content -->
      <div id="report-panel" class="report-content">
        <div class="welcome-screen">
          <div class="welcome-icon">🏙️</div>
          <h3>NYC Zoning Analysis</h3>
          <p>Search for a New York City property address, or input a 10-digit Borough-Block-Lot (BBL) identifier to generate a custom zoning and massing report.</p>
        </div>
      </div>
    </aside>
    
    <!-- Viewports Container (2D Map & 3D Renderer) -->
    <main class="viewports-container">
      <!-- 2D Geographic Map Panel -->
      <div class="viewport-panel" id="panel-2d">
        <div class="viewport-header">
          <div class="viewport-title">2D GIS Reference Map</div>
          <button class="view-size-btn" id="btn-size-2d" title="Maximize 2D Map">⛶</button>
        </div>
        <div id="map-container"></div>
      </div>
      
      <!-- 3D Massing Mesh Model Panel -->
      <div class="viewport-panel" id="panel-3d">
        <div class="viewport-header">
          <div class="viewport-title">3D Envelope Massing Model</div>
          <button class="view-size-btn" id="btn-size-3d" title="Maximize 3D Viewer">⛶</button>
        </div>
        <div id="renderer-3d-container"></div>
        
        <!-- Interactive 3D Model Toggles -->
        <div class="view-controls-3d">
          <button class="control-btn active" data-view="all">Show All</button>
          <button class="control-btn" data-view="proposed">Proposed Max Building</button>
          <button class="control-btn" data-view="envelope">Zoning Envelope</button>
          <button class="control-btn" data-view="built">Existing Buildings</button>
        </div>
      </div>
    </main>
  </div>

  <!-- Leaflet GIS Map Library JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" 
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  
  <!-- Main Application Script -->
  <script type="module" src="/src/main.js"></script>
</body>
</html>
